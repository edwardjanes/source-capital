<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; padding: 2rem 1.5rem; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .header-title { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
  .header-raise { display: flex; justify-content: center; align-items: baseline; gap: 2px; }
  .raise-letter { font-size: 42px; font-weight: 700; color: #1a5ea8; line-height: 1; }
  .raise-dot { font-size: 32px; font-weight: 700; color: #1a5ea8; line-height: 1; }
  .raise-rest { font-size: 42px; font-weight: 300; color: #1a1a1a; line-height: 1; letter-spacing: 0.02em; }

  .pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 2rem; }
  .step-btn {
    flex: 1; cursor: pointer; padding: 14px 10px 12px;
    background: #fff; border: 1px solid #e5e3dd;
    text-align: center; transition: all 0.15s; position: relative;
  }
  .step-btn:first-child { border-radius: 10px 0 0 10px; }
  .step-btn:last-child { border-radius: 0 10px 10px 0; }
  .step-btn + .step-btn { border-left: none; }
  .step-btn:hover { background: #f0f4fb; }
  .step-btn.active { background: #1a5ea8; border-color: #1a5ea8; }
  .step-btn.active .s-letter { color: #fff; }
  .step-btn.active .s-name { color: rgba(255,255,255,0.8); }
  .step-btn.done { background: #e8f0fb; border-color: #bed3f4; }
  .step-btn.done .s-letter { color: #1a5ea8; }
  .step-btn.done .s-name { color: #1a5ea8; }
  .s-letter { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1; margin-bottom: 3px; }
  .s-name { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: #999; }

  .arrow-sep { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 12px solid #e5e3dd; flex-shrink: 0; position: relative; z-index: 2; }

  .progress-bar { height: 3px; background: #e5e3dd; border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a5ea8; border-radius: 2px; transition: width 0.3s ease; }

  .card { background: #fff; border: 1px solid #e5e3dd; border-radius: 14px; padding: 2rem; }
  .card-header { display: flex; align-items: flex-start; gap: 1.25rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0ede8; }
  .big-letter { font-size: 56px; font-weight: 700; color: #1a5ea8; line-height: 1; flex-shrink: 0; }
  .card-titles { }
  .card-name { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .card-tag { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #1a5ea8; background: #e8f0fb; padding: 4px 10px; border-radius: 20px; display: inline-block; }

  .card-body { font-size: 15px; color: #444; line-height: 1.75; }
  .card-body p + p { margin-top: 0.875rem; }

  .pillrow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1.5rem; }
  .pill { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; background: #f8f7f4; color: #555; border: 1px solid #e5e3dd; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; padding-top: 1.5rem; border-top: 1px solid #f0ede8; }
  .step-count { font-size: 13px; color: #aaa; }
  .nav-btns { display: flex; gap: 10px; }
  .nav-btn {
    font-size: 13px; font-weight: 500; padding: 8px 18px;
    border-radius: 8px; border: 1px solid #e5e3dd;
    background: #fff; color: #1a1a1a; cursor: pointer;
    transition: all 0.12s;
  }
  .nav-btn:hover:not(:disabled) { background: #f0f4fb; border-color: #bed3f4; color: #1a5ea8; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary { background: #1a5ea8; border-color: #1a5ea8; color: #fff; }
  .nav-btn.primary:hover:not(:disabled) { background: #174e91; }

  .pain-prize { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1.5rem; }
  .pp-card { padding: 14px 16px; border-radius: 10px; }
  .pp-card.pain { background: #fef3f2; border: 1px solid #fcd9d8; }
  .pp-card.prize { background: #f0faf4; border: 1px solid #c3e8cf; }
  .pp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .pp-card.pain .pp-label { color: #c0392b; }
  .pp-card.prize .pp-label { color: #1a7a42; }
  .pp-text { font-size: 13px; line-height: 1.6; color: #555; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Source Capital</div>
  <div class="header-raise">
    <span class="raise-letter">R</span><span class="raise-dot">.</span>
    <span class="raise-letter">A</span><span class="raise-dot">.</span>
    <span class="raise-letter">I</span><span class="raise-dot">.</span>
    <span class="raise-letter">S</span><span class="raise-dot">.</span>
    <span class="raise-letter">E</span><span class="raise-dot">.</span>
    <span class="raise-rest">&nbsp;Framework</span>
  </div>
</div>

<div class="pipeline" id="pipeline"></div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="card" id="card"></div>

<script>
const stages = [
  {
    letter: "R",
    name: "Readiness",
    tag: "Strategic positioning sprint",
    body: `<p>We start by diagnosing where your raise is really breaking down — looking at your current positioning, valuation logic, traction, investor readiness, and likely weaknesses before they get exposed in the market.</p><p>You leave this stage knowing exactly what is helping your raise and what is undermining it.</p>`,
    pills: ["Positioning audit", "Valuation logic", "Traction review", "Investor readiness score", "Weakness diagnosis"]
  },
  {
    letter: "A",
    name: "Assets",
    tag: "Investor materials & data room",
    body: `<p>Next, we help you build the materials investors expect to see — your pitch deck, financial model, founder narrative, and the way your opportunity is framed.</p><p>Not generic templates. Not vague advice. The actual assets you need to enter the market credibly.</p>`,
    pills: ["Pitch deck", "Financial model", "Founder narrative", "Data room", "Opportunity framing"]
  },
  {
    letter: "I",
    name: "Investor list",
    tag: "Warm introductions",
    body: `<p>Then we build your investor target list. Not a random database. Not a broad list of names. A strategic shortlist of investors matched to your stage, sector, geography, and raise profile.</p><p>Stop guessing who to approach and start targeting people who make sense.</p>`,
    pills: ["Stage filter", "Sector alignment", "Geography match", "Raise profile fit", "Shortlist strategy"]
  },
  {
    letter: "S",
    name: "Structured outreach",
    tag: "Personalised feedback & raise support",
    body: `<p>Once the foundations are in place, we help you launch a clear and disciplined outreach process — messaging, cadence, follow-up, pipeline structure, and investor tracking.</p><p>Instead of starting and stopping every few days, you run your raise like a process.</p>`,
    pills: ["Outreach messaging", "Cadence planning", "Follow-up system", "Pipeline structure", "Investor tracking"]
  },
  {
    letter: "E",
    name: "Engagement",
    tag: "Aligned investor network",
    body: `<p>Finally, we help you handle the conversations that follow — investor meetings, tough questions, objections, follow-ups, and momentum between conversations.</p><p>Getting the meeting is only one part of the raise. Knowing how to handle what happens next is what keeps the process alive.</p>`,
    pills: ["Meeting preparation", "Objection handling", "Follow-up momentum", "Commitment close", "Raise management"]
  }
];

let current = 0;

function buildPipeline() {
  const el = document.getElementById("pipeline");
  el.innerHTML = "";
  stages.forEach((s, i) => {
    if (i > 0) {
      const arr = document.createElement("div");
      arr.className = "arrow-sep";
      el.appendChild(arr);
    }
    const btn = document.createElement("div");
    btn.className = "step-btn" + (i === current ? " active" : i < current ? " done" : "");
    btn.innerHTML = `<div class="s-letter">${s.letter}</div><div class="s-name">${s.name}</div>`;
    btn.addEventListener("click", () => go(i));
    el.appendChild(btn);
  });
}

function buildCard(i) {
  const s = stages[i];
  document.getElementById("progress").style.width = ((i + 1) / stages.length * 100) + "%";
  document.getElementById("card").innerHTML = `
    <div class="card-header">
      <div class="big-letter">${s.letter}</div>
      <div class="card-titles">
        <div class="card-name">${s.name}</div>
        <span class="card-tag">${s.tag}</span>
      </div>
    </div>
    <div class="card-body">${s.body}</div>
    <div class="pillrow">${s.pills.map(p => `<span class="pill">${p}</span>`).join("")}</div>
    ${i === 0 ? `
    <div class="pain-prize">
      <div class="pp-card pain">
        <div class="pp-label">The pain</div>
        <div class="pp-text">Unclear positioning, limited investor access, inconsistent outreach, weak pitches, and stalled momentum.</div>
      </div>
      <div class="pp-card prize">
        <div class="pp-label">The outcome</div>
        <div class="pp-text">Raise capital with confidence and control — on your terms, with a repeatable process behind you.</div>
      </div>
    </div>` : ""}
    <div class="nav">
      <div class="step-count">Step ${i + 1} of ${stages.length}</div>
      <div class="nav-btns">
        <button class="nav-btn" id="prev" ${i === 0 ? "disabled" : ""}>← Previous</button>
        <button class="nav-btn primary" id="next" ${i === stages.length - 1 ? "disabled" : ""}>Next →</button>
      </div>
    </div>
  `;
  document.getElementById("prev")?.addEventListener("click", () => go(i - 1));
  document.getElementById("next")?.addEventListener("click", () => go(i + 1));
}

function go(i) {
  if (i < 0 || i >= stages.length) return;
  current = i;
  buildPipeline();
  buildCard(i);
}

go(0);
</script>
</body>
</html>
