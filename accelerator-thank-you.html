<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Source Capital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

  <div class="max-w-3xl mx-auto px-6 py-24 text-center">
    <div class="mb-12">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-500/10 rounded-full mb-8">
        <span class="text-5xl">✅</span>
      </div>
      <h1 class="text-5xl font-bold mb-6">Thank You!</h1>
      <p class="text-2xl text-gray-300">We've received your details.</p>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-10 md:p-16">
      <h2 class="text-3xl font-semibold mb-8">Next Step: Book Your Free Raise Audit Call</h2>
      <p class="text-gray-400 mb-10">Your information has been pre-filled below.</p>

      <!-- Cal.com Embed -->
      <div style="width:100%;height:700px;overflow:scroll" id="my-cal-inline-raise-accelerator-audit-call"></div>
    </div>
  </div>

  <!-- Cal.com Embed Script with Pre-fill -->
  <script type="text/javascript">
    (function (C, A, L) { 
      let p = function (a, ar) { a.q.push(ar); }; 
      let d = C.document; 
      C.Cal = C.Cal || function () { 
        let cal = C.Cal; let ar = arguments; 
        if (!cal.loaded) { 
          cal.ns = {}; cal.q = cal.q || []; 
          d.head.appendChild(d.createElement("script")).src = A; 
          cal.loaded = true; 
        } 
        if (ar[0] === L) { 
          const api = function () { p(api, arguments); }; 
          const namespace = ar[1]; 
          api.q = api.q || []; 
          if(typeof namespace === "string"){ 
            cal.ns[namespace] = cal.ns[namespace] || api; 
            p(cal.ns[namespace], ar); p(cal, ["initNamespace", namespace]); 
          } else p(cal, ar); 
          return; 
        } 
        p(cal, ar); 
      }; 
    })(window, "https://app.cal.com/embed/embed.js", "init");

    Cal("init", "raise-accelerator-audit-call", {origin:"https://app.cal.com"});

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const name = (params.get('firstName') || '') + ' ' + (params.get('lastName') || '');
    const email = params.get('email') || '';
    const notes = params.get('business') ? `Business: ${params.get('business')}` : '';

    Cal.ns["raise-accelerator-audit-call"]("inline", {
      elementOrSelector: "#my-cal-inline-raise-accelerator-audit-call",
      config: { 
        "layout":"month_view",
        "useSlotsViewOnSmallScreen":"true",
        "name": name.trim(),
        "email": email,
        "notes": notes
      },
      calLink: "edward-janes/raise-accelerator-audit-call",
    });

    Cal.ns["raise-accelerator-audit-call"]("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
  </script>

</body>
</html>
